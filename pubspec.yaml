name: shinra_ia
description: "Shinra.IA - Agent IA de bureau pour animation 2D et développement"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  google_fonts: ^6.2.1
  dio: ^5.4.0
  firebase_core: ^3.9.0
  firebase_auth: ^5.5.0
  google_sign_in: ^6.2.2
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.0
  flutter_secure_storage: ^9.2.3
  url_launcher: ^6.3.1
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#050609"
    theme_color: "#E1233D"
  windows:
    generate: true
    image_path: "assets/icon/icon.png"
  macos:
    generate: true
    image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  assets:
    - lib/assets/images/
